<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA: save the full URL to sessionStorage, then redirect to root.
    sessionStorage.redirect = location.href;
    location.href = location.pathname.split('/').slice(0, 2).join('/') + '/';
  </script>
</head>
</html>
